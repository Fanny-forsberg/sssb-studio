<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skapa & Schemalägg — SSSB Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="kalender.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">SSSB <span>Studio</span></div>
      <nav class="header-nav">
        <a href="index.html" class="active">Skapa & Schemalägg</a>
        <a href="publicering.html">Publiceringsplan</a>
        <a href="ideer.html">Idéer</a>
        <a href="omskrivaren.html">Omskrivaren</a>
        <a href="svarsmall.html">Svarsmall</a>
        <a href="kampanj.html">Kampanjer</a>
        <a href="basta-tid.html">Bästa tid</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-eyebrow">Av, för, med studenter</div>
      <h1>Skapa & <em>schemalägg</em></h1>
      <p>Skriv caption, välj datum och tid — skicka direkt till Later för schemaläggning.</p>
    </section>

    <section class="form-section">
      <div class="card">
        <div class="field">
          <label for="topic">Ämne eller trend</label>
          <input type="text" id="topic" placeholder="T.ex. studentboende Stockholm, tips för nyinflyttade, hållbart boende...">
        </div>

        <div class="field">
          <label>Välj kanaler</label>
          <div class="platforms">
            <label class="platform-toggle">
              <input type="checkbox" value="instagram" checked>
              <span class="platform-chip instagram">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                Instagram
              </span>
            </label>
            <label class="platform-toggle">
              <input type="checkbox" value="tiktok" checked>
              <span class="platform-chip tiktok">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.75a8.17 8.17 0 004.79 1.52V6.79a4.85 4.85 0 01-1.02-.1z"/></svg>
                TikTok
              </span>
            </label>
            <label class="platform-toggle">
              <input type="checkbox" value="linkedin" checked>
              <span class="platform-chip linkedin">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                LinkedIn
              </span>
            </label>
          </div>
        </div>

        <div class="field">
          <label for="context">Extra kontext <span class="optional">(valfritt)</span></label>
          <textarea id="context" rows="2" placeholder="T.ex. vi lanserar vår nya app, vi söker hyresgäster till Solna..."></textarea>
        </div>

        <div class="field">
          <label>Schemalägg <span class="optional">(valfritt — för Later)</span></label>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <input type="date" id="schedule-date" style="flex:1;min-width:150px;">
            <input type="time" id="schedule-time" value="10:00" style="width:120px;">
          </div>
        </div>

        <button id="generateBtn" class="btn-primary" onclick="showPasteArea()">
          Skapa inlägg
        </button>
      </div>
    </section>

    <section class="results-section" id="results" style="display:none">
      <h2>Dina texter</h2>
      <p class="results-desc" id="schedule-info"></p>
      <div id="captions-grid" class="captions-grid"></div>
      <div class="save-row">
        <button class="btn-primary" onclick="saveAll()">Spara i historik</button>
        <span id="save-status" class="save-status"></span>
      </div>
    </section>

    <section class="history-section" id="history-section" style="display:none">
      <h2>Historik</h2>
      <div id="history-list" class="history-list"></div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    // Default schedule date to tomorrow
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    document.getElementById('schedule-date').value = tomorrow.toISOString().split('T')[0];
  </script>
</body>
</html>

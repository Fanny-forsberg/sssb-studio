<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logga in — SSSB Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .login-box {
      width:100%; max-width:400px;
      background:var(--white); border:2px solid var(--brown);
      border-radius:var(--radius-lg); padding:44px 34px 36px;
      box-shadow:var(--shadow);
    }
    .login-logo {
      font-family:'Fraunces',Georgia,serif;
      font-weight:900; font-size:30px; color:var(--brown);
      text-align:center; margin-bottom:4px;
    }
    .login-logo span { color:var(--red); }
    .login-sub { text-align:center; font-size:14px; color:var(--tan); margin-bottom:32px; }
    .login-box .field { margin-bottom:18px; }
    .login-box input[type="email"],
    .login-box input[type="password"] {
      width:100%; border:2px solid var(--border-dark);
      border-radius:var(--radius); padding:13px 14px;
      font-size:15px; font-family:inherit; color:var(--brown);
      background:var(--cream); outline:none;
      transition:border-color .15s, box-shadow .15s;
    }
    .login-box input:focus {
      border-color:var(--brown);
      box-shadow:3px 3px 0 var(--brown);
      background:var(--white);
    }
    .login-box .btn-primary { width:100%; text-align:center; margin-top:6px; }
    .login-error {
      background:#FEF2F2; border:2px solid var(--red);
      border-radius:var(--radius); padding:10px 14px;
      font-size:13px; color:var(--red); font-weight:600;
      margin-bottom:16px; display:none;
    }
    .login-success {
      background:var(--green-light); border:2px solid var(--green);
      border-radius:var(--radius); padding:10px 14px;
      font-size:13px; color:var(--green); font-weight:600;
      margin-bottom:16px; display:none;
    }
    .login-toggle {
      text-align:center; margin-top:18px;
      font-size:13px; color:var(--tan);
    }
    .login-toggle a {
      color:var(--red); text-decoration:underline; cursor:pointer; font-weight:600;
    }
    .login-footer {
      text-align:center; font-size:11px; color:var(--tan-light);
      margin-top:22px; line-height:1.5;
    }
  </style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">SSSB <span>Studio</span></div>
  <p class="login-sub" id="form-title">Logga in för att fortsätta</p>

  <div class="login-error" id="error-msg"></div>
  <div class="login-success" id="success-msg"></div>

  <form onsubmit="handleSubmit(event)">
    <div class="field" id="name-field" style="display:none;">
      <label for="name">Namn</label>
      <input type="text" id="name" placeholder="Ditt namn">
    </div>
    <div class="field">
      <label for="email">E-post</label>
      <input type="email" id="email" placeholder="namn@sssb.se" required autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Lösenord</label>
      <input type="password" id="password" placeholder="Ditt lösenord" required>
    </div>
    <button type="submit" class="btn-primary" id="submit-btn">Logga in</button>
  </form>

  <div class="login-toggle" id="toggle-area">
    Första gången? <a onclick="toggleMode()">Skapa konto</a>
  </div>

  <div class="login-footer">Begränsad till @sssb.se-konton</div>
</div>

<script>
  let isSignUp = false;

  function toggleMode() {
    isSignUp = !isSignUp;
    document.getElementById('form-title').textContent = isSignUp ? 'Skapa ett konto' : 'Logga in för att fortsätta';
    document.getElementById('submit-btn').textContent = isSignUp ? 'Skapa konto' : 'Logga in';
    document.getElementById('name-field').style.display = isSignUp ? '' : 'none';
    document.getElementById('toggle-area').innerHTML = isSignUp
      ? 'Har redan konto? <a onclick="toggleMode()">Logga in</a>'
      : 'Första gången? <a onclick="toggleMode()">Skapa konto</a>';
    hideMessages();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }
  function hideMessages() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }

  // Simple hash function for passwords (not crypto-grade, but fine for this use case)
  async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password + '_sssb_studio_salt');
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function getUsers() {
    try { return JSON.parse(localStorage.getItem('sssb_users') || '{}'); } catch { return {}; }
  }
  function saveUsers(users) {
    localStorage.setItem('sssb_users', JSON.stringify(users));
  }

  async function handleSubmit(e) {
    e.preventDefault();
    hideMessages();

    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const name = document.getElementById('name').value.trim();

    if (!email.endsWith('@sssb.se')) {
      showError('Bara @sssb.se-adresser kan använda SSSB Studio.');
      return;
    }
    if (password.length < 6) {
      showError('Lösenordet måste vara minst 6 tecken.');
      return;
    }

    const hash = await hashPassword(password);
    const users = getUsers();

    if (isSignUp) {
      if (users[email]) {
        showError('Kontot finns redan. Logga in istället.');
        return;
      }
      if (!name) {
        showError('Skriv ditt namn.');
        return;
      }
      users[email] = { name, hash, created: new Date().toISOString() };
      saveUsers(users);
      showSuccess('Konto skapat! Du loggas in...');
      localStorage.setItem('sssb_session', JSON.stringify({ email, name }));
      setTimeout(() => { window.location.href = 'index.html'; }, 800);

    } else {
      const user = users[email];
      if (!user) {
        showError('Inget konto med den adressen. Skapa konto först.');
        return;
      }
      if (user.hash !== hash) {
        showError('Fel lösenord.');
        return;
      }
      localStorage.setItem('sssb_session', JSON.stringify({ email, name: user.name }));
      window.location.href = 'index.html';
    }
  }

  // If already logged in, redirect
  const session = localStorage.getItem('sssb_session');
  if (session) window.location.href = 'index.html';
</script>

</body>
</html>
